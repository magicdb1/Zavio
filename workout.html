<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard – Zavio</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body data-page="app">
    <header class="header">
      <nav class="navbar">
        <a href="dashboard.html" class="logo">Zavio</a>

        <ul class="nav-menu">
          <li><a href="dashboard.html" class="nav-link">Home</a></li>
          <li><a href="workout.html" class="nav-link">Workout</a></li>
          <li><a href="templates.html" class="nav-link">Vorlagen</a></li>
          <li><a href="progress.html" class="nav-link">Progress</a></li>
        </ul>

        <button id="logoutBtnTop" class="button button-secondary nav-cta">
          Logout
        </button>

        <button class="hamburger" type="button" aria-label="Menü öffnen">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </button>
      </nav>
    </header>

    <main class="dashboard-page">
      <section class="dashboard-hero">
        <p class="eyebrow">Workout</p>
        <h1>Training starten</h1>
        <p>Trage dein heutiges Workout ein.</p>
      </section>

      <section class="dashboard-grid clean-app-grid">
        <div class="dashboard-card start-card">
          <p class="eyebrow">Schritt 1</p>
          <h3>Workout wählen</h3>

          <div class="form-group">
            <label>Tag</label>
            <select id="workoutDay">
              <option>Montag</option>
              <option>Dienstag</option>
              <option>Mittwoch</option>
              <option>Donnerstag</option>
              <option>Freitag</option>
              <option>Samstag</option>
              <option>Sonntag</option>
            </select>
          </div>

          <div class="form-group">
            <label>Training</label>
            <select id="workoutType">
              <option value="">Bitte wählen</option>
              <option value="Push">Push</option>
              <option value="Pull">Pull</option>
              <option value="Legs">Legs</option>
              <option value="Upper">Upper Body</option>
              <option value="Lower">Lower Body</option>
              <option value="Full Body">Full Body</option>
            </select>
          </div>

          <div class="form-group">
            <label>Vorlage</label>
            <select id="templateSelect">
              <option value="">Keine Vorlage</option>
            </select>
          </div>

          <button
            id="loadTemplateBtn"
            class="button button-secondary"
            type="button"
          >
            Vorlage laden
          </button>
        </div>

        <div class="dashboard-card exercise-card">
          <p class="eyebrow">Schritt 2</p>
          <h3>Übung hinzufügen</h3>

          <div class="form-group">
            <label>Übung suchen</label>
            <input
              id="exerciseSearch"
              type="text"
              placeholder="z. B. Bench, Curl..."
            />
          </div>

          <div class="form-group">
            <label>Übung</label>
            <select id="exerciseSelect"></select>
          </div>

          <button
            id="addCustomExerciseBtn"
            class="button button-secondary hidden-custom-btn"
            type="button"
          >
            Eigene Übung hinzufügen
          </button>

          <div class="form-group">
            <label>Anzahl Sätze</label>
            <input
              id="setsInput"
              type="number"
              min="1"
              max="10"
              placeholder="3"
            />
          </div>

          <div id="setsContainer" class="sets-container"></div>

          <button
            id="addExerciseBtn"
            class="button button-secondary"
            type="button"
          >
            Übung hinzufügen
          </button>
        </div>

        <div class="dashboard-card current-workout-card">
          <p class="eyebrow">Schritt 3</p>
          <h3>Aktuelles Workout</h3>

          <div id="currentWorkoutList" class="current-workout-list"></div>

          <div class="current-actions">
            <button
              id="saveTemplateBtn"
              class="button button-secondary"
              type="button"
            >
              Als Vorlage speichern
            </button>

            <button
              id="saveWorkoutBtn"
              class="button button-primary"
              type="button"
            >
              Workout speichern
            </button>
          </div>

          <p id="workoutStatus" class="form-status"></p>
        </div>

        <div class="dashboard-card history-card">
          <p class="eyebrow">Verlauf</p>
          <h3>Letzte Workouts</h3>

          <div class="history-filters">
            <select id="historyTypeFilter">
              <option value="">Alle Trainings</option>
              <option value="Push">Push</option>
              <option value="Pull">Pull</option>
              <option value="Legs">Legs</option>
              <option value="Upper">Upper Body</option>
              <option value="Lower">Lower Body</option>
              <option value="Full Body">Full Body</option>
            </select>

            <select id="historyDayFilter">
              <option value="">Alle Tage</option>
              <option>Montag</option>
              <option>Dienstag</option>
              <option>Mittwoch</option>
              <option>Donnerstag</option>
              <option>Freitag</option>
              <option>Samstag</option>
              <option>Sonntag</option>
            </select>
          </div>

          <div id="workoutList"></div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>© 2026 Zavio</p>
      <div>
        <a href="impressum.html" class="link">Impressum</a>
        <a href="datenschutz.html" class="link">Datenschutz</a>
        <a href="agb.html" class="link">AGB</a>
      </div>
    </footer>

    <script src="main.js"></script>
  </body>
</html>
